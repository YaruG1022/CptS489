<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HomePlate â€?Log In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/stylesheets/style.css">
        <link rel="stylesheet" href="/stylesheets/login.css">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">

        <!-- Brand -->
        <a href="index.html" class="auth-logo">HomePlate</a>
        <div class="auth-tagline">Homemade meals from cooks in your neighborhood</div>

        <div class="auth-title">Welcome back</div>

        <!-- Form -->
        <form action="customer-dashboard.html" method="get" onsubmit="return validateLogin()">

            <div class="mb-3">
                <label class="auth-label mb-1" for="login-email">Email address</label>
                <input type="email" id="login-email" class="form-control auth-input"
                    placeholder="you@example.com" required autocomplete="email">
            </div>

            <div class="mb-1">
                <label class="auth-label mb-1" for="login-password">Password</label>
                <div class="password-toggle">
                    <input type="password" id="login-password" class="form-control auth-input"
                        placeholder="Enter your password" required autocomplete="current-password">
                    <button type="button" class="toggle-btn" onclick="togglePassword('login-password', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="d-flex justify-content-end mb-4">
                <a href="forgot-password.html" style="font-family:'Poppins',sans-serif;font-size:0.82rem;color:var(--burnt-orange-primary);text-decoration:none;font-weight:600;">
                    Forgot password?
                </a>
            </div>

            <!-- Error message placeholder -->
            <div id="login-error" class="alert alert-danger py-2" style="font-family:'Open Sans',sans-serif;font-size:0.85rem;display:none;">
                Invalid email or password. Please try again.
            </div>

            <button type="submit" class="btn-auth">
                <i class="bi bi-box-arrow-in-right me-2"></i>Log In
            </button>
        </form>

        <div class="auth-divider">or</div>

        <!-- Role prompt -->
        <div style="text-align:center;font-family:'Open Sans',sans-serif;font-size:0.84rem;color:#888;margin-bottom:12px;">
            Are you a cook? <a href="login.html" style="color:var(--sage-green-secondary);font-weight:600;text-decoration:none;">Cook sign in <i class="bi bi-arrow-right"></i></a>
        </div>

        <div class="auth-footer">
            Don't have an account? <a href="register.html">Sign up free</a>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/javascripts/login.js"></script>
</body>
</html>
