<!-- Add / Edit Modal -->
<div class="modal fade" id="menuItemModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius:14px;border:none;">
            <div class="modal-header" style="border-bottom:1px solid #f0e8d8;">
                <h5 class="modal-title" id="menuModalTitle" style="font-family:'Poppins',sans-serif;font-weight:600;">Add Menu Item</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label" style="font-family:'Poppins',sans-serif;font-size:0.85rem;font-weight:500;">Item Name</label>
                    <input type="text" class="form-control" id="modal-item-name" placeholder="e.g. Chicken Tikka Masala">
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <label class="form-label" style="font-family:'Poppins',sans-serif;font-size:0.85rem;font-weight:500;">Price ($)</label>
                        <input type="number" step="0.01" class="form-control" id="modal-item-price" placeholder="0.00">
                    </div>
                    <div class="col-6">
                        <label class="form-label" style="font-family:'Poppins',sans-serif;font-size:0.85rem;font-weight:500;">Quantity</label>
                        <input type="number" class="form-control" id="modal-item-qty" placeholder="0">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label" style="font-family:'Poppins',sans-serif;font-size:0.85rem;font-weight:500;">Category</label>
                    <input type="text" class="form-control" id="modal-item-category" placeholder="e.g. Indian · Curry">
                </div>
                <div class="mb-3">
                    <label class="form-label" style="font-family:'Poppins',sans-serif;font-size:0.85rem;font-weight:500;">Description</label>
                    <textarea class="form-control" id="modal-item-desc" rows="2" placeholder="Short description..."></textarea>
                </div>
            </div>
            <div class="modal-footer" style="border-top:1px solid #f0e8d8;">
                <button type="button" class="btn btn-sm btn-hp-outline" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-sm btn-hp" id="modal-save-btn" onclick="saveMenuItem()">Save</button>
            </div>
        </div>
    </div>
</div>

<script>
var editingRow = null;

function openAddModal() {
    editingRow = null;
    document.getElementById('menuModalTitle').textContent = 'Add Menu Item';
    document.getElementById('modal-item-name').value = '';
    document.getElementById('modal-item-price').value = '';
    document.getElementById('modal-item-qty').value = '';
    document.getElementById('modal-item-category').value = '';
    document.getElementById('modal-item-desc').value = '';
    new bootstrap.Modal(document.getElementById('menuItemModal')).show();
}

function openEditModal(btn) {
    editingRow = btn.closest('.menu-item-row');
    document.getElementById('menuModalTitle').textContent = 'Edit Menu Item';
    var name = editingRow.querySelector('[style*="font-weight:600"]').textContent;
    var price = editingRow.querySelector('strong').textContent.replace('$', '');
    var qty = editingRow.querySelector('.menu-qty-badge').textContent.replace('Qty: ', '');
    var cat = editingRow.querySelector('[style*="color:#888"]').textContent.trim();
    document.getElementById('modal-item-name').value = name;
    document.getElementById('modal-item-price').value = price;
    document.getElementById('modal-item-qty').value = qty;
    document.getElementById('modal-item-category').value = cat;
    document.getElementById('modal-item-desc').value = '';
    new bootstrap.Modal(document.getElementById('menuItemModal')).show();
}

function saveMenuItem() {
    var name = document.getElementById('modal-item-name').value.trim();
    var price = parseFloat(document.getElementById('modal-item-price').value) || 0;
    var qty = parseInt(document.getElementById('modal-item-qty').value) || 0;
    var cat = document.getElementById('modal-item-category').value.trim() || 'General';
    if (!name) return;

    if (editingRow) {
        editingRow.querySelector('[style*="font-weight:600"]').textContent = name;
        editingRow.querySelector('strong').textContent = '$' + price.toFixed(2);
        editingRow.querySelector('.menu-qty-badge').textContent = 'Qty: ' + qty;
        editingRow.querySelector('[style*="color:#888"]').textContent = cat;
    } else {
        var container = document.querySelector('.section-card');
        var html =
            '<div class="menu-item-row">' +
            '  <div class="d-flex align-items-center gap-3 flex-grow-1" style="min-width:0;">' +
            '    <div class="menu-item-icon"><i class="bi bi-egg-fried"></i></div>' +
            '    <div style="flex:1;min-width:0;">' +
            '      <div style="font-family:\'Poppins\',sans-serif;font-weight:600;font-size:0.95rem;">' + name + '</div>' +
            '      <div style="font-family:\'Open Sans\',sans-serif;font-size:0.82rem;color:#888;">' + cat + '</div>' +
            '    </div>' +
            '  </div>' +
            '  <div class="d-flex align-items-center gap-3" style="flex-shrink:0;">' +
            '    <span class="menu-qty-badge">Qty: ' + qty + '</span>' +
            '    <strong style="font-family:\'Poppins\',sans-serif;color:var(--burnt-orange-primary);min-width:60px;text-align:right;">$' + price.toFixed(2) + '</strong>' +
            '    <button class="btn btn-sm btn-hp-outline" onclick="openEditModal(this)" title="Edit"><i class="bi bi-pencil"></i></button>' +
            '    <button class="btn btn-sm btn-hp-outline" style="color:#dc3545;border-color:#dc3545;" onclick="deleteMenuItem(this)" title="Delete"><i class="bi bi-trash"></i></button>' +
            '  </div>' +
            '</div>';
        container.insertAdjacentHTML('beforeend', html);
    }
    bootstrap.Modal.getInstance(document.getElementById('menuItemModal')).hide();
}

function deleteMenuItem(btn) {
    var row = btn.closest('.menu-item-row');
    row.style.transition = 'opacity 0.2s';
    row.style.opacity = '0';
    setTimeout(function() { row.remove(); }, 200);
}
</script>
